# Database configuration
# Credentials can be overridden via environment variables:
#   QLINK_DB_JDBC_URI, QLINK_DB_USERNAME, QLINK_DB_PASSWORD
qlink.db.use_google_driver=false
qlink.db.jdbc_uri=jdbc:mysql://127.0.0.1:3306/qlink
qlink.db.username=qlinkuser
qlink.db.password=

qlink.keepalive.enabled=true

qlink.habitat.host=127.0.0.1
qlink.habitat.port=1337

qlink.chat.irc.host=chat.freenode.net
qlink.chat.irc.port=6667

qlink.proto.qlink.port=5190
qlink.proto.habitat.port=1986

# Protocol Analysis Configuration
# Enable capture at startup (can also be enabled at runtime)
qlink.protocol.capture.enabled=false
# Only capture unknown actions (reduces noise)
qlink.protocol.capture.unknowns_only=true
# Maximum records to keep in memory buffer
qlink.protocol.capture.buffer_size=10000
# Optional log file for persistent capture (comment out to disable)
#qlink.protocol.capture.log_file=logs/protocol_capture.log
# Enable database persistence (requires protocol_schema.sql)
qlink.protocol.capture.persist_to_db=false
